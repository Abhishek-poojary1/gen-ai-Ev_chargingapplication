name: ev_gamma_flutter
description: Community EV Charging Network for Rural India
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # State Management
  provider: ^6.1.1

  # Local Storage (replaces Firebase for free/offline use)
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^11.0.0

  # HTTP
  http: ^1.2.0

  # UI
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
